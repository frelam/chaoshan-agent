# ============================================================
# 潮汕美食 — 评价者画像数据库 (Reviewer Profiles)
# ============================================================
# 每条记录 = 一个评价者的综合画像
# 数据来源：从 restaurants.yaml 中的评价者信息自动积累
#
# 用途：
#   - 支撑个性化推荐（"和你画像相似的人觉得..."）
#   - 评价可信度评估
#   - 发现不同人群的口味差异
# ============================================================

meta:
  name: 潮汕美食评价者画像库
  version: "2.0.0"
  total_profiles: 0
  last_updated: "2026-06-05"

# ============================================================
# 口味偏好标签体系
# ============================================================
# 以下标签可以从评价文本中提取，或由用户自述
# 分类仅作组织用途，每个标签独立存在
taste_tag_taxonomy:
  # 口味倾向
  taste_profile:
    - "喜欢油香"          # 偏好油脂丰富的部位/菜品
    - "怕油腻"            # 偏好精瘦、清淡
    - "喜欢清淡"          # 偏好原味、少调料
    - "喜欢浓郁"          # 偏好味道重、调料多
    - "喜欢辣"            # 偏好加辣
    - "嗜甜"              # 偏好甜味

  # 口感偏好
  texture_preference:
    - "喜欢弹牙"          # 偏好有嚼劲、Q弹的口感
    - "喜欢软嫩"          # 偏好入口即化的口感
    - "喜欢脆爽"          # 偏好爽脆口感（如胸口朥、牛百叶）
    - "喜欢韧劲"          # 偏好有嚼头的质感

  # 用餐偏好
  dining_style:
    - "追求性价比"        # 关注价格和分量
    - "追求食材品质"      # 愿意为高质量食材多花钱
    - "喜欢尝鲜"          # 喜欢尝试新奇菜品
    - "保守型食客"        # 偏好稳妥、经典选择

  # 场景偏好（从 visit_context 提取）
  scene_preference:
    - "适合聚餐"          # 适合多人用餐
    - "适合打卡"          # 适合首次体验
    - "适合日常"          # 日常随便吃吃
    - "适合宵夜"          # 深夜觅食

# ============================================================
# 画像条目
# ============================================================

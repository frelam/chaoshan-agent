# === 贡献指南 ===
# 1. 复制下方 TEMPLATE 注释中的模板
# 2. 填写你的真实评价（好吃就说好吃，不好吃就说不好吃）
# 3. review_text 不少于 30 字，必须有具体口感/味道描述
# 4. 提交 PR，维护者审核后合并
#
# === 评价质量要求 ===
# - 必须是本人亲自去过、吃过的店
# - 不接受"还行""可以""一般"等模糊评价
# - 鼓励具体描述：什么菜好吃、为什么好吃、什么口感
# - 环境和服务可以提，但不是评价重点
# ============================================================


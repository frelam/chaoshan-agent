# ============================================================
# 评价条目
# ============================================================
# 每条评价的核心字段说明：
#
# restaurant_name  — 店名（尽量使用大众熟知的名称）
# address          — 地址（精确到门牌号或地标）
# district         — 所属区县（从 meta.districts 中选择）
# cuisine_type     — 美食品类（从 meta.food_categories 中选择）
#
# reviewer:
#   id              — 评价者唯一标识
#   type            — local(本地人) / tourist(游客) / returning-visitor(回访客)
#   hometown        — 精确到城市，如"汕头"、"广州"、"北京"、"上海"
#   age_range       — 年龄段：18-25 / 26-35 / 36-50 / 50+
#   taste_tags      — 口味偏好标签，如 ["喜欢油香", "喜欢弹牙", "怕油腻"]
#                     （从评价文本中提取或用户自述）
#
# visit_date       — 到店日期（用于时间衰减）
# submit_date      — 提交/录入日期（用于时间衰减）
# visit_context    — 用餐场景（午餐/晚餐/宵夜、和谁一起、什么场合）
#
# dishes_ordered:
#   每道菜独立评分和评价。包括：
#   name       — 菜名
#   rating     — 1-5分，对该菜品的独立评分
#   price      — 价格（元），或 "approx"
#   comment    — 具体口感描述
#
# overall_rating  — 本次综合评分 1-5
# review_text     — 详细文字评价（不少于30字）
# would_revisit   — true/false 是否愿意再吃
# tags            — 自定义标签
#
# contributor     — 来源标识（GitHub用户名 / "cuisine-self-evolve" 等）
# source_type     — self(自动收集) / community(社区贡献) / web(用户提交)
# source_url      — 自动收集时的原始来源URL（如有）
# ============================================================


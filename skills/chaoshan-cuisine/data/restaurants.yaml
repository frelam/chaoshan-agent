# ============================================================
# 潮汕美食评价库 — 食客原始评价 (Raw Reviews)
# ============================================================
# 每一条记录 = 一位贡献者的一次探店评价
#
# 设计理念：
#   - 不做榜单/排名。排序是针对具体用户的，因人而异。
#   - 每条评价都包含评价者画像，支撑个性化推荐。
#   - "好吃"可以有很多种定义，保留所有真实声音。
#
# 数据来源：
#   - self: 本系统自动收集（web search 提取）
#   - community: GitHub 开源贡献
#   - web: 用户通过网页/小程序提交
#
# 评价质量要求：
#   - 必须是本人亲自去过、吃过的店
#   - 不接受"还行""可以""一般"等模糊评价
#   - 鼓励具体描述：什么菜好吃、为什么好吃、什么口感
#   - 好评差评一样珍贵——多元声音是核心价值
# ============================================================


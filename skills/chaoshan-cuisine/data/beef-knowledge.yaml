  # ============================================================
  # 12. 牛肉丸
  # ============================================================
  - cut: 牛肉丸
    mandarin: 潮汕牛肉丸
    pengim: ghu5 nêg8 in5
    category: 内脏/加工类
    position: 加工品——用新鲜牛后腿肉手工捶打制成
    fat_content: 低至中等（取决于是否加了牛油/胸口朥碎）
    texture: 弹牙、爽脆、多汁
    mouthfeel: |
      真正的潮汕牛肉丸是用铁棒手工捶打新鲜牛后腿肉（不是绞肉机！），
      破坏肌肉纤维后再捏成丸。咬下去有"弹牙"的阻力感，内部充满
      汤汁（捶打时加入的冰水和牛油在加热后释放）。和外地火锅店里
      那种软塌塌的"牛肉丸"完全不是一种东西。
    cooking:
      method: 煮
      time: 5-8分钟（生丸），2-3分钟（熟丸）
      doneness: 全熟（浮起即可）
      tip: "判断真假的简单方法：能在地上弹起来的才是真正的潮汕牛肉丸（真事）。咬开应该有蜂窝状的孔洞（手打的痕迹）。"
    preferred_by:
      age_group: [5, 80]
      taste_preference: ["几乎所有口味偏好的人"]
      eating_habit: ["全年龄段", "潮汕牛肉火锅必点项", "每桌一盘起步"]
      personality: ["全民食物，没有特定人群限制"]
    regional_names:
      chaoshan:
        - 牛肉丸
        - 牛丸
      china_other:
        beijing: 潮汕牛肉丸
        shanghai: 潮汕牛肉丸
        guangzhou: 牛肉丸
        chengdu: 潮汕牛肉丸
      international:
        japan: "牛肉つみれ (gyūniku tsumire) / 潮州式牛肉団子"
        japan_note: "日本无直接对应品，最接近的是 つみれ（鱼/肉丸），但做法不同"
        korea: "소고기 완자 (sogogi wanja)"
        korea_note: "韩国肉丸通常不追求弹牙口感，本质不同"
        us: "Chaoshan beef ball"
        australia: "beef ball (Chaoshan style)"
        france: "boulette de boeuf (style Chaoshan)"
        italy: "polpetta di manzo (stile Chaoshan)"
        note: "潮汕牛肉丸是独特的加工技艺，国外无直接对应产品。弹牙口感在国际肉丸中极为罕见。"
    price_level: 中等
    rarity: 极普遍（每桌必点）
    authenticity_check:
      color: 灰白色（不是鲜红的——鲜红的是加了色素的）
      texture: 表面粗糙、有肉纤维感（不是光滑的——光滑的是机器绞的）
      bounce: 能弹起来
      interior: 咬开有蜂窝孔洞
      ingredients: 牛肉+盐+冰水+少量生粉。如果配料表有卡拉胶/大豆蛋白，不是正宗潮汕牛肉丸。

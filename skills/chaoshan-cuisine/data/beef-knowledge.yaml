  # ============================================================
  # 11. 牛百叶
  # ============================================================
  - cut: 牛百叶
    mandarin: 牛百叶 / 牛重瓣胃
    pengim: ghu5 bêh4 hiêh8
    category: 内脏/加工类
    position: 牛的第三个胃（重瓣胃），表面呈叶片状褶皱
    fat_content: 极低
    texture: 爽脆、弹牙
    mouthfeel: |
      叶片状结构让它能最大程度挂住汤汁，咬下去"咔嚓"作响。
      完全没有内脏腥味（处理得当的话），纯吃口感和汤底的鲜。
      潮汕牛肉火锅里的牛百叶通常是黑色的（未漂白），比火锅店
      常见的白色牛百叶更天然。
    cooking:
      method: 涮
      time: 15-20秒
      doneness: 全熟
      tip: "筷子夹住在滚汤中'七上八下'，叶片变硬挺即可。涮太久会缩水变韧。"
    preferred_by:
      age_group: [20, 55]
      taste_preference: ["喜欢爽脆口感", "喜欢内脏"]
      eating_habit: ["火锅爱好者", "喜欢尝试各种食材的人"]
      personality: ["不排斥内脏的人——但牛百叶的接受度比大多数内脏高"]
    regional_names:

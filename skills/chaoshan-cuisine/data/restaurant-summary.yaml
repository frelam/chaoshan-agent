# ============================================================
# 潮汕美食店铺总览 — 多维聚合画像 (Aggregated Profiles)
# ============================================================
# 每条记录 = 一家店铺的综合画像
# 数据来源：从 reviews.db 通过公平算法自动聚合生成
#
# 设计理念：
#   - 不展示单一排名/排序。排序是针对用户的，因人而异。
#   - 展示多维度数据，让用户自己判断。
#   - 保留少数派声音（≥15%的观点独立展示）。
#   - 反操控检测（短期大量集中打分标记不删除）。
#   - 时间衰减加权（越近的评价权重越高）。
#
# 聚合算法：见 docs/FAIRNESS-ALGORITHM.md
# 个性化推荐：见 docs/PERSONALIZATION-ALGORITHM.md
# ============================================================


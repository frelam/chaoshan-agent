# ============================================================
# 潮汕美食店铺总览 — 多维聚合画像 (Aggregated Profiles)
# ============================================================
# 每条记录 = 一家店铺的综合画像
# 数据来源：从 restaurants.yaml 通过公平算法自动聚合生成
#
# 设计理念：
#   - 不展示单一排名/排序。排序是针对用户的，因人而异。
#   - 展示多维度数据，让用户自己判断。
#   - 保留少数派声音（≥15%的观点独立展示）。
#   - 反操控检测（短期大量集中打分标记不删除）。
#   - 时间衰减加权（越近的评价权重越高）。
#
# 聚合算法：见 docs/FAIRNESS-ALGORITHM.md
# 个性化推荐：见 docs/PERSONALIZATION-ALGORITHM.md
# ============================================================

meta:
  name: 潮汕美食店铺总览
  version: "2.0.0"
  total_restaurants: 0
  total_reviews_processed: 0
  last_updated: "2026-06-05"
  algorithm_version: "2.0.0"
  algorithm:
    rating_method: median          # 中位数抗极值
    time_decay:
      within_1y: 1.0              # 1年内权重1.0
      within_2y: 0.8              # 1-2年权重0.8
      within_3y: 0.5              # 2-3年权重0.5
      over_3y: 0.3                # 超过3年权重0.3
      old_shop_bonus: true        # 老店且评价稳定时 >3年评价权重 0.6
    minority_threshold: 0.15       # ≥15%的观点独立保留
    consensus_threshold: 0.60      # ≥60%的观点归入共识
    anti_manipulation:
      suspicious_window_days: 7
      suspicious_min_reviews: 3
      suspicious_action: flag_not_delete

# ============================================================
# 店铺条目
# ============================================================

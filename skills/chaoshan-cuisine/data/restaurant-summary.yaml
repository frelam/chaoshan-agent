meta:
  name: 潮汕美食店铺总览
  version: "1.0.0"
  total_restaurants: 0
  last_updated: "2026-06-05"
  algorithm_version: "1.0.0"
  algorithm:
    rating_method: median        # 中位数抗极值
    minority_threshold: 0.15     # ≥15% 的观点独立保留
    consensus_threshold: 0.60    # ≥60% 的观点归入共识
    time_decay:
      within_1y: 1.0
      within_2y: 0.8
      within_3y: 0.5
      over_3y: 0.3
    anti_manipulation:
      suspicious_window_days: 7
      suspicious_min_reviews: 3
      suspicious_action: flag_not_delete


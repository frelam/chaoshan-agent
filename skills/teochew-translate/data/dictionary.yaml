  - char: 领姨块鸡
    mandarin: 你阿姨的逼（极其粗俗的骂人话）
    pengim: nêng2 i5 go3 goi1
    example: 汝勿呾领姨块鸡，过无礼。
    example_mandarin: 你不要说你姨的逼，很没礼貌。
    tags: [潮汕特色, 粗口, 脏话]
    note: >
      "领"是"恁"(你/你家的)的近音字。"鸡"在此处是粗俗隐语，
      源自闽南语/潮汕话"鸡掰"(goi1 bai1=膣屄，女性生殖器)。
      整句相当于"恁母鸡掰"(你妈的逼)，只是侮辱对象换成"阿姨"。
      极其粗俗，日常应避免使用。

  - char: 扑母
    mandarin: 我靠/卧槽/妈的（多功能粗俗感叹词）
    pengim: pah4 bho2
    example: 个扑母照劲！真个是汝做个咩？
    example_mandarin: 我靠这么厉害！真的是你做的吗？
    tags: [潮汕特色, 粗口, 脏话, 感叹词]
    note: >
      潮汕话最核心的粗口词汇之一，用途极其广泛。字面义"扑=击打/性交"+"母=母亲"，
      相当于普通话"操你妈"的缩略形式，但在实际使用中已高度语法化/语义漂白：
      (1) 惊讶感叹："扑母！好劲！"=我靠！好厉害！
      (2) 愤怒咒骂："扑母！内底乞贼偷去！"=妈的！家里被贼偷了！
      (3) 熟人间口头禅：无实质恶意，仅作语气助词，类似"卧槽"
      (4) 程度副词化：置于"到"之后表极端，"惨到扑母"=惨到极点、"好到扑母"=好得不得了
      (5) 变体："扑母仔"(骂第三人的混蛋)、"扑领母"(直接辱骂对方母亲，冒犯性更强)、
      "散扑母"(坑爹/乱来的)、"扑你母"(直接指向对方)。
      注意：虽在熟人之间可作轻松口头禅，但在正式场合、长辈面前、陌生人面前严禁使用。

  - char: 早死仔
    mandarin: 短命鬼/短命的孩子（中度詈语，可作粗口感叹词或口头禅）
    pengim: za2 si2 gian2
    example: 早死仔，叫汝莫骂人汝怎又骂人！
    example_mandarin: 短命鬼，叫你别骂人你怎么又骂人！
    tags: [潮汕特色, 粗口, 詈语]
    note: >
      本字为"早死囝"(za2 si2 gian2)，俗写"早死仔"。"囝"在潮汕话中
      本义为"孩子/儿子"，作名词后缀十分常用（孥囝=小孩、姿娘仔=女孩子、
      后生仔=年轻人），但在骂詈词中强化贬义色彩。字面义为"早死的孩子"，
      属潮汕"死病残"类骂詈语，相当于普通话"短命鬼"。
      【语气轻重分级】
      ① 轻度（熟人口头禅/调侃）：语义淡化，类似"你这家伙"或北方话"这孙子"。
        例："早死仔，是汝上浪险！"=你这家伙，是你最厉害！
      ② 中度（长辈训斥/责骂）：常见于父母训斥小孩，带责备但不一定是诅咒。
        例："早死仔，叫汝莫骂人汝怎又骂人！"
      ③ 重度（愤怒咒骂）：明显恶意，表达强烈愤怒和诅咒。
        例："只个早死仔，乞我掠着拍死去！"=这个短命鬼，被逮到打死你！
      ④ 程度补语（置于"到"之后）：表极端程度，已高度虚化。
        例："畅到早死仔"=高兴得要命、"气到早死仔"=气得要死。
      【同类词】短命仔、死父仔、无父仔、吐血仔、破家仔、讨债仔。
      注意：属不文明用语，正式场合及对长辈/陌生人避免使用。网络上曾有
      经典笑话：外地人把「早死仔」误当作「早上好」，见人就喊，闹出大笑话。


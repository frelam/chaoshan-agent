# ============================================================
# 潮汕话 ↔ 普通话 词映射表 (Teochew ↔ Mandarin Dictionary)
# ============================================================
# 拼音采用潮州话拼音方案 (Peng'im / Teochew Romanization)
# 声调数字: 1阴平 2阴上 3阴去 4阴入 5阳平 6阳上 7阳去 8阳入
#
# 参考文献:
#   - 《潮州音字典》(林伦伦主编)
#   - 《潮汕方言词义溯源》(林伦伦)
#   - 《新潮汕字典》(张晓山)
#   - 《潮汕话教程》(广东高等教育出版社)
# ============================================================

meta:
  name: 潮汕话-普通话词典
  version: "1.2.6"
  total_entries: 180+
  categories:
    - 人称代词
    - 日常问候
    - 数字时间
    - 形容词
    - 动词
    - 食物名称
    - 动物
    - 潮汕特色词汇
    - 疑问词
    - 方位词
    - 身体部位
    - 颜色
    - 天气自然
    - 情感
    - 职业身份
    - 亲属称谓

entries:

  # ========================
  # 1. 人称代词 (Personal Pronouns)
  # ========================
  - char: 我
    mandarin: 我
    pengim: ua2
    example: 我来去食饭。
    example_mandarin: 我去吃饭。
    tags: [人称代词, 基础]

  - char: 汝
    mandarin: 你
    pengim: le2
    example: 汝好，食饱未？
    example_mandarin: 你好，吃饭了吗？
    tags: [人称代词, 基础]

  - char: 伊
    mandarin: 他/她
    pengim: i1
    example: 伊是潮州人。
    example_mandarin: 他/她是潮州人。
    tags: [人称代词, 基础]

  - char: 阮
    mandarin: 我们（排除式）
    pengim: uang2 / ng2
    example: 阮明早起去汕头。
    example_mandarin: 我们明天去汕头。
    tags: [人称代词, 基础]
    note: 排除听话人，听者不在"我们"之中

  - char: 俺
    mandarin: 咱们（包括式）
    pengim: nang2
    example: 俺做一下来去。
    example_mandarin: 咱们一起去。
    tags: [人称代词, 基础]
    note: 包括听话人，潮汕话"我们"必须区分包括/排除

  - char: 恁
    mandarin: 你们
    pengim: ning2
    example: 恁爱去底块？
    example_mandarin: 你们要去哪里？
    tags: [人称代词, 基础]

  - char: 伊侬
    mandarin: 他们
    pengim: i1 nang5
    example: 伊侬拢总来去食茶。
    example_mandarin: 他们全都去喝茶了。
    tags: [人称代词]

  - char: 胶己
    mandarin: 自己
    pengim: ga1 gi7
    example: 胶己人莫客气。
    example_mandarin: 自己人别客气。
    tags: [人称代词, 潮汕特色]

  - char: 胶己人
    mandarin: 自己人/潮汕人
    pengim: ga1 gi7 nang5
    example: 胶己人，免用客气。
    example_mandarin: 自己人，不用客气。
    tags: [人称代词, 潮汕特色, 文化]
    note: 既是"自己人"也是潮汕人对同胞的称呼，有强烈乡谊色彩

  - char: 底侬
    mandarin: 谁
    pengim: di7 diang5
    example: 汝是底侬？
    example_mandarin: 你是谁？
    tags: [人称代词, 疑问词]

  - char: 别侬
    mandarin: 别人
    pengim: bag8 nang5
    example: 莫呾乞别侬听。
    example_mandarin: 别说给别人听。
    tags: [人称代词]

  - char: 逐个
    mandarin: 大家/每个人
    pengim: dag8 gai5
    example: 逐个拢总来。
    example_mandarin: 大家都来。
    tags: [人称代词]

  - char: 汝儂
    mandarin: 你们（后置复数变体）
    pengim: le2 nang5 / leu2 nang7
    example: 汝儂有闲来阮内食茶。
    example_mandarin: 你们有空来我家喝茶。
    tags: [人称代词]
    note: "恁(ning2)为标准说法；汝儂(le2 nang5)为后置复数变体，闽南语渗透影响，新加坡潮汕话中更常见"

  # ========================
  # 2. 日常问候 (Daily Greetings)
  # ========================
  - char: 汝好
    mandarin: 你好
    pengim: le2 ho2
    example: 阿伯，汝好！
    example_mandarin: 伯伯，你好！
    tags: [日常问候, 基础]

  - char: 食饱未
    mandarin: 吃饭了吗（问候语）
    pengim: ziah8 ba2 bhuê7
    example: 食饱未？来阮内食茶。
    example_mandarin: 吃饭了吗？来我家喝茶。
    tags: [日常问候, 文化]
    note: 潮汕最经典的问候语，并非真正关心是否吃饭

  - char: 早头好
    mandarin: 早上好
    pengim: za2 tao5 ho2
    example: 早头好！今日天时真好。
    example_mandarin: 早上好！今天天气真好。
    tags: [日常问候]

  - char: 免用客气
    mandarin: 不用客气
    pengim: miang2 êng7 kêh4 ki3
    example: 免用客气，家己来。
    example_mandarin: 不用客气，自己来。
    tags: [日常问候]

  - char: 歹势
    mandarin: 不好意思/对不起
    pengim: dai2 sê3
    example: 歹势，我慢来。
    example_mandarin: 不好意思，我来晚了。
    tags: [日常问候, 潮汕特色]

  - char: 麻烦汝
    mandarin: 麻烦你/谢谢你
    pengim: mua5 huêng5 le2
    example: 麻烦汝共我买张票。
    example_mandarin: 麻烦你帮我买张票。
    tags: [日常问候]

  - char: 心事
    mandarin: 谢谢（较正式）
    pengim: sim1 se7
    example: 心事汝！
    example_mandarin: 谢谢你！
    tags: [日常问候]
    note: 较正式的道谢

  - char: 再见
    mandarin: 再见
    pengim: zai3 giang3
    example: 我行先，再见！
    example_mandarin: 我先走了，再见！
    tags: [日常问候]

  - char: 请坐
    mandarin: 请坐
    pengim: cian2 zo6
    example: 请坐，我来泡茶。
    example_mandarin: 请坐，我来泡茶。
    tags: [日常问候]

  - char: 慢行
    mandarin: 慢走/再见
    pengim: mang7 gian5
    example: 慢行，下日再来。
    example_mandarin: 慢走，改天再来。
    tags: [日常问候]
    note: 送别时的常用语

  - char: 相借问
    mandarin: 打招呼/问候
    pengim: siê1 zioh4 mung7
    example: 出门遇着侬着相借问。
    example_mandarin: 出门遇到人要打招呼。
    tags: [日常问候, 文化]

  - char: 小姐
    mandarin: 小姐/年轻女子
    pengim: siê2 zê2
    example: 只个小姐生来过雅。
    example_mandarin: 这位小姐长得很漂亮。
    tags: [日常问候]

  - char: 对唔住
    mandarin: 对不起
    pengim: dui3 m6 zu6
    example: 对唔住，我来迟了。
    example_mandarin: 对不起，我来晚了。
    tags: [日常问候]
    note: 用于较正式的道歉，比\"歹势\"更正式

  - char: 㩼谢
    mandarin: 多谢
    pengim: zoi7 sia7
    example: 㩼谢汝个帮忙。
    example_mandarin: 多谢你的帮忙。
    tags: [日常问候]
    note: 较正式的道谢语，\"㩼\"同\"多\"，比\"心事\"语气更重

  - char: 请问
    mandarin: 请问
    pengim: cian2 mung7
    example: 请问，汕头车站做尼行？
    example_mandarin: 请问，汕头车站怎么走？
    tags: [日常问候]
    note: 与普通话\"请问\"用法相同，礼貌用语

  - char: 免客气
    mandarin: 别客气/不客气
    pengim: miang2 kêh4 ki3
    example: 免客气，胶己人。
    example_mandarin: 不客气，自己人。
    tags: [日常问候]
    note: ＂免客气\"是\"免用客气\"的简省形式，更口语化

  - char: 厝
    mandarin: 房子/家
    pengim: cu3
    example: 阮厝在汕头老市区。
    example_mandarin: 我家在汕头老市区。
    tags: [日常问候]
    note: 潮汕话\"房屋/家\"的基本说法，对应闽南语的\"厝\"

  - char: 太太
    mandarin: 太太/夫人（尊称）
    pengim: tai3 tai3
    example: 太太，请坐，来食茶。
    example_mandarin: 太太，请坐，来喝茶。
    tags: [日常问候]
    note: 潮汕话中\"太太\"用于尊称年长女性或已婚女士

  - char: 姑娘
    mandarin: 姑娘/年轻女子（旧称）
    pengim: gou1 niên5
    example: 只个姑娘生来过雅。
    example_mandarin: 这位姑娘长得很漂亮。
    tags: [日常问候]
    note: \"姑娘\"在潮汕话中为旧式尊称，较\"小姐\"更传统，类似闽南语\"姑娘\"用法

  # ========================
  # 3. 数字/时间 (Numbers & Time)
  # ========================
  - char: 蜀/一
    mandarin: 一
    pengim: zêg8 / ig4
    example: 我有一本书。
    example_mandarin: 我有一本书。
    tags: [数字时间, 基础]
    note: zêg8为白读（口语数数/量词前）, ig4为文读（序数/复合词）

  - char: 两/二
    mandarin: 二
    pengim: no6 / ri6
    example: 两个人来。
    example_mandarin: 两个人来。
    tags: [数字时间, 基础]
    note: no6为白读（量词前）, ri6为文读（序数/复合词）

  - char: 三
    mandarin: 三
    pengim: san1
    example: 三人行，必有我师。
    example_mandarin: 三人行，必有我师。
    tags: [数字时间, 基础]

  - char: 四
    mandarin: 四
    pengim: si3
    example: 一年有四季。
    example_mandarin: 一年有四季。
    tags: [数字时间, 基础]

  - char: 五
    mandarin: 五
    pengim: ngou6
    example: 手有五指。
    example_mandarin: 手有五指。
    tags: [数字时间, 基础]

  - char: 今日
    mandarin: 今天
    pengim: gim1 rig8
    example: 今日欲去地块？
    example_mandarin: 今天要去哪里？
    tags: [数字时间, 基础]

  - char: 明起
    mandarin: 明天
    pengim: mua3 ki2
    example: 明起阮休息。
    example_mandarin: 明天我们休息。
    tags: [数字时间, 基础]
    note: 汕头话标准说法

  - char: 嘛日
    mandarin: 明天
    pengim: ma1 rig8
    example: 嘛日，个死父扑母资娘，爱去投伊阿妈担。
    example_mandarin: 明天，这个该死的女人，要去跟她妈告状。
    tags: [数字时间, 潮汕特色]
    note: 潮阳/揭阳方言变体。"嘛"为"明"的借音写法（方言音ma1）。汕头话用"明起"(mua3 ki2)或"明日"(mua3 rig8/mêng5 rig8)

  - char: 昨日
    mandarin: 昨天
    pengim: za1 rig8
    example: 昨日我无来。
    example_mandarin: 昨天我没来。
    tags: [数字时间, 基础]

  - char: 前日
    mandarin: 前天
    pengim: zoin5 rig8
    example: 前日落了成日雨。
    example_mandarin: 前天下了一整天雨。
    tags: [数字时间]

  - char: 后日
    mandarin: 后天
    pengim: ao6 rig8
    example: 后日伊欲来。
    example_mandarin: 后天他要来。
    tags: [数字时间]

  - char: 日昼
    mandarin: 中午
    pengim: rig8 dao3
    example: 日昼爱食乜个？
    example_mandarin: 中午要吃什么？
    tags: [数字时间]

  - char: 上旰
    mandarin: 上午
    pengim: ziên6 gua3
    example: 上旰我上图书馆去。
    example_mandarin: 上午我去了图书馆。
    tags: [数字时间]

  - char: 下旰
    mandarin: 下午
    pengim: ê6 gua3
    example: 下旰我无闲。
    example_mandarin: 下午我没空。
    tags: [数字时间]

  - char: 暗暝
    mandarin: 晚上
    pengim: am3 mên5
    example: 暗暝来我内食。
    example_mandarin: 晚上来我家吃。
    tags: [数字时间]

  - char: 透早
    mandarin: 清晨/一大早
    pengim: tao3 za2
    example: 伊透早就出门。
    example_mandarin: 他一大早就出门了。
    tags: [数字时间]

  - char: 下昏
    mandarin: 傍晚
    pengim: ê6 hng1
    example: 下昏来去行行。
    example_mandarin: 傍晚去走走吧。
    tags: [数字时间]

  - char: 只阵
    mandarin: 现在
    pengim: zi2 zung5
    example: 只阵几点？
    example_mandarin: 现在几点？
    tags: [数字时间, 基础]

  - char: 头先
    mandarin: 刚才
    pengim: tao5 soin1
    example: 头先我有看着伊。
    example_mandarin: 刚才我有看到他。
    tags: [数字时间]

  - char: 一困仔
    mandarin: 一会儿
    pengim: zêg8 kung3 gian2
    example: 等一困仔。
    example_mandarin: 等一会儿。
    tags: [数字时间]

  - char: 下日
    mandarin: 改天/以后
    pengim: ê6 rig8
    example: 下日正来。
    example_mandarin: 改天再来。
    tags: [数字时间]

  - char: 旧年
    mandarin: 去年
    pengim: gu7 ni5
    example: 旧年我去过汕头。
    example_mandarin: 去年我去过汕头。
    tags: [数字时间]

  - char: 六
    mandarin: 六
    pengim: lag8
    example: 六个人来。
    example_mandarin: 六个人来了。
    tags: [数字时间, 基础]

  - char: 七
    mandarin: 七
    pengim: cig4
    example: 七个碟。
    example_mandarin: 七个碟子。
    tags: [数字时间, 基础]

  - char: 八
    mandarin: 八
    pengim: boih4
    example: 八个人做一下。
    example_mandarin: 八个人一起做。
    tags: [数字时间, 基础]

  - char: 九
    mandarin: 九
    pengim: gao2
    example: 九月开学。
    example_mandarin: 九月开学。
    tags: [数字时间, 基础]

  - char: 十
    mandarin: 十
    pengim: zab8
    example: 十个学生来。
    example_mandarin: 十个学生来了。
    tags: [数字时间, 基础]

  - char: 百
    mandarin: 百
    pengim: bêh4
    example: 百外侬来参加。
    example_mandarin: 一百多人来参加。
    tags: [数字时间]

  - char: 千
    mandarin: 千
    pengim: coin1
    example: 汕头有千万侬。
    example_mandarin: 汕头有千万人。
    tags: [数字时间]

  - char: 万
    mandarin: 万
    pengim: bhuang7
    example: 一只手机值万外银。
    example_mandarin: 一台手机值一万多块。
    tags: [数字时间]

  - char: 珍时
    mandarin: 什么时候/何时
    pengim: diang1 si5
    example: 珍时来阮内食茶？
    example_mandarin: 什么时候来我家喝茶？
    tags: [数字时间, 基础]
    note: "珍时(diang1 si5)是潮汕话\"什么时候\"的标准说法，相当于闽南语的\"当时\"。同义词：底时(di7 si5)"

  # ========================
  # 4. 形容词 (Adjectives)
  # ========================
  - char: 雅
    mandarin: 漂亮/好看
    pengim: ngia2
    example: 只个姿娘仔过雅。
    example_mandarin: 这个女孩子很漂亮。
    tags: [形容词, 基础]

  - char: 䆀
    mandarin: 丑/难看
    pengim: mai2
    example: 伊生来𠀾䆀。
    example_mandarin: 他长得不丑。
    tags: [形容词]

  - char: 好食
    mandarin: 好吃
    pengim: ho2 ziah8
    example: 潮州菜过好食。
    example_mandarin: 潮州菜很好吃。
    tags: [形容词, 食物]

  - char: 䭕
    mandarin: 淡/没味道
    pengim: zian2
    example: 只碗汤过䭕。
    example_mandarin: 这碗汤太淡了。
    tags: [形容词, 食物]

  - char: 咸
    mandarin: 咸
    pengim: giam5
    example: 只个菜伤咸。
    example_mandarin: 这个菜太咸了。
    tags: [形容词, 食物]

  - char: 甜
    mandarin: 甜
    pengim: diam5
    example: 潮州柑过甜。
    example_mandarin: 潮州柑很甜。
    tags: [形容词, 食物]

  - char: 酸
    mandarin: 酸
    pengim: seng1
    example: 只粒柑伤酸。
    example_mandarin: 这个橘子太酸了。
    tags: [形容词, 食物]

  - char: 苦
    mandarin: 苦
    pengim: kou2
    example: 只杯茶过苦。
    example_mandarin: 这杯茶很苦。
    tags: [形容词, 食物]

  - char: 辣
    mandarin: 辣
    pengim: luah8
    example: 潮州菜𠀾伤辣。
    example_mandarin: 潮州菜不太辣。
    tags: [形容词, 食物]

  - char: 大
    mandarin: 大
    pengim: dua7
    example: 只间厝过大。
    example_mandarin: 这间房子很大。
    tags: [形容词, 基础]

  - char: 细
    mandarin: 小
    pengim: soi3
    example: 只粒柑伤细。
    example_mandarin: 这个橘子太小了。
    tags: [形容词, 基础]

  - char: 悬
    mandarin: 高
    pengim: guin5
    example: 只座楼过悬。
    example_mandarin: 这座楼很高。
    tags: [形容词]

  - char: 下
    mandarin: 低
    pengim: gê6
    example: 天顶飞机飞过下。
    example_mandarin: 天上的飞机飞得很低。
    tags: [形容词]

  - char: 烧
    mandarin: 热（温度）/暖和
    pengim: siê1
    example: 水烧烧，好洗浴。
    example_mandarin: 水热热的，可以洗澡。
    tags: [形容词, 基础]

  - char: 凝
    mandarin: 冷
    pengim: ngang5
    example: 今日过凝，着穿加件衫。
    example_mandarin: 今天很冷，要多穿件衣服。
    tags: [形容词, 基础]

  - char: 清气
    mandarin: 干净
    pengim: cêng1 ki3
    example: 伊内底过清气。
    example_mandarin: 他家里很干净。
    tags: [形容词]

  - char: 垃圾
    mandarin: 脏
    pengim: lah4 sab4
    example: 只块过垃圾。
    example_mandarin: 这里很脏。
    tags: [形容词]

  - char: 聪明 / 灵精
    mandarin: 聪明
    pengim: cong1 mêng5 / lêng5 zêng1
    example: 只个孥囝过灵精。

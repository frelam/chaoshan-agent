    example_mandarin: 学校放学了，孩子回家来。
    tags: [职业, 教育]
    note: 学堂(oh8 deng5)是潮汕话对学校的传统说法，多指中小学校

  - char: 师父
    mandarin: 师傅/师父
    pengim: sai1 bê2
    example: 师父在教徒弟。
    example_mandarin: 师傅在教徒弟。
    tags: [职业]
    note: 潮汕话中师父(sai1 bê2)用于称呼手工艺人、技师等，区别于先生(sing1 sên1)指教师/医生

  - char: 律師
    mandarin: 律师
    pengim: lug8 se1
    example: 伊是名律師，帮侬打官司。
    example_mandarin: 他是有名律师，帮人打官司。
    tags: [职业身份]

  - char: 女士
    mandarin: 女士/小姐（尊称）
    pengim: ni2 se3
    example: 这位女士是老师。
    example_mandarin: 这位女士是老师。
    tags: [职业身份, 日常问候]

  - char: 博士
    mandarin: 博士
    pengim: pag4 se6
    example: 伊在学堂读博士。
    example_mandarin: 他在大学读博士。
    tags: [职业身份]

  # ========================
  # 17. 日常用品 (Household Items)
  # ========================

  - char: 扫帚
    mandarin: 扫帚/扫把
    pengim: sao3 siu2
    example: 用扫帚扫下只内。
    example_mandarin: 用扫帚扫一下这屋子。
    tags: [日常用品]

  - char: 雨遮
    mandarin: 雨伞
    pengim: hou6 zia1
    example: 外口落雨，着带雨遮。
    example_mandarin: 外面下雨，要带雨伞。
    tags: [日常用品]

  - char: 薰
    mandarin: 香烟/烟
    pengim: hun1
    example: 食薰对身体无好。
    example_mandarin: 抽烟对身体不好。
    tags: [日常用品]
    note: 薰(hun1)为潮汕话对香烟/烟草的说法，食薰(ziah8 hun1)=抽烟。也读作hng1

  - char: 冰箱
    mandarin: 冰箱/冰柜
    pengim: bian1 siên1 / bian1 sion1
    example: 冰箱内有食个物。
    example_mandarin: 冰箱里有吃的东西。
    tags: [日常用品]
    note: 冰读bian1为白读，文读为bêng1。冰箱在日常口语用白读bian1 siên1

  - char: 锁匙
    mandarin: 钥匙
    pengim: so2 si5
    example: 我个锁匙囥在衫袋内。
    example_mandarin: 我的钥匙放在衣服口袋里。
    tags: [日常用品]

  - char: 碗
    mandarin: 碗
    pengim: uan2
    example: 洗碗水勿放过㩼。
    example_mandarin: 洗碗水不要放太多。
    tags: [日常用品]

  - char: 窗
    mandarin: 窗户/窗子
    pengim: têng1
    example: 开窗透气。
    example_mandarin: 开窗通风。
    tags: [日常用品]

  - char: 箸
    mandarin: 筷子
    pengim: de7
    example: 用箸食饭。
    example_mandarin: 用筷子吃饭。
    tags: [日常用品]

  - char: 电话
    mandarin: 电话
    pengim: diang6 uê7
    example: 乞我打个电话转内。
    example_mandarin: 让我打个电话回家。
    tags: [日常用品]
    note: 电话(diang6 uê7)为潮汕话标准说法，电读diang6为白读，文读为diêng6。电话在日常生活中用白读

  - char: 雪文
    mandarin: 肥皂
    pengim: soh4 bhung5
    example: 挈块雪文来洗衫。
    example_mandarin: 拿块肥皂来洗衣服。
    tags: [日常用品]
    note: 雪文(soh4 bhung5)借自马来语sabun，是潮汕话中对肥皂的日常说法

  # ========================
  # 18. 量词 (Measure Words / Classifiers)
  # ========================
  - char: 隻
    mandarin: 只（动物/家具/禽畜的量词）
    pengim: ziah4
    example: 一只鸡，两只狗，三只椅。
    example_mandarin: 一只鸡，两只狗，三张椅子。
    tags: [量词, 基础]
    note: 隻(ziah4)是潮汕话最常用的动物量词，也用于家具车辆等物件的量词，如一隻桌、一隻车

  - char: 間
    mandarin: 间（房屋/房间的量词）
    pengim: goin1
    example: 一间厝两间房。
    example_mandarin: 一栋房子两间房间。
    tags: [量词, 基础]

  - char: 條
    mandarin: 条（细长物的量词）
    pengim: diêu5
    example: 一条路，一条线，一条索。
    example_mandarin: 一条路，一条线，一条绳子。
    tags: [量词, 基础]

  - char: 雙
    mandarin: 双（成对的量词）
    pengim: sang1
    example: 买一双鞋。
    example_mandarin: 买一双鞋。
    tags: [量词, 基础]

  - char: 張
    mandarin: 张（纸/桌/机器的量词）
    pengim: diên1
    example: 一张纸，一张桌，一张脚车。
    example_mandarin: 一张纸，一张桌子，一辆自行车。
    tags: [量词, 基础]

  - char: 粒
    mandarin: 粒（水果/蛋/球等圆形物的量词）
    pengim: liab8
    example: 一粒苹果，两粒卵。
    example_mandarin: 一个苹果，两个蛋。
    tags: [量词, 基础]
    note: 粒(liab8)是潮汕话最常用的圆形物量词，用于水果、蛋、球、珠子等

  - char: 尾
    mandarin: 尾（鱼的量词）
    pengim: bhuê2
    example: 一尾鱼，两尾鲈鱼。
    example_mandarin: 一条鱼，两条鲈鱼。
    tags: [量词]
    note: 潮汕话用\"尾\"作鱼类的量词，对应普通话\"条\"。字面义为\"尾巴\"

  - char: 本
    mandarin: 本（书/册子的量词）
    pengim: bung2
    example: 一本册，两本簿。
    example_mandarin: 一本书，两本簿子。
    tags: [量词, 基础]

  - char: 對
    mandarin: 对/双（成对物品的量词）
    pengim: dui1
    example: 一对手环，一对鞋。
    example_mandarin: 一对手镯，一双鞋。
    tags: [量词]
    note: 對(dui1)与雙(sang1)同义，可互换使用

  - char: 撮
    mandarin: 撮（复数量词，相当于"些"）
    pengim: coh4
    example: 一撮侬在许块等车。
    example_mandarin: 一些人在那里等车。
    tags: [量词]
    note: 撮(coh4)是潮汕话的复数量词，相当于普通话的"些"，可用于人和物，如撮侬(coh4 nang5)=一些人、撮物(coh4 muêh8)=一些东西

  - char: 枝
    mandarin: 枝（细长物的量词，如笔/刀/针）
    pengim: gi1
    example: 一枝笔，两枝针。
    example_mandarin: 一支笔，两根针。
    tags: [量词, 基础]
    note: 枝(gi1)用于细长且坚硬之物，如笔(pik4=笔)、刀(to1=刀)、针(tsam1=针)、竹竿(têg4go1=竹竿)

  - char: 欉
    mandarin: 欉（树木/植物的量词）
    pengim: cang5
    example: 一欉树，两欉花。
    example_mandarin: 一棵树，两株花。
    tags: [量词]
    note: 欉(cang5)为潮汕话中树木/花草/植物的专用量词，对应普通话的"棵/株"，是闽南语特色量词

  - char: 領
    mandarin: 领（衣物/被褥的量词）
    pengim: nian2
    example: 一领衫，两领裤。
    example_mandarin: 一件衣服，两条裤子。
    tags: [量词]
    note: 領(nian2)是潮汕话中衣物、被褥、网类的量词，对应普通话的"件/条"。例句：一领衫(一件衣服)、一领网(一张网)

  - char: 塊
    mandarin: 块（片状物/土地/地方的量词）
    pengim: go3
    example: 一块肉，两块地。
    example_mandarin: 一块肉，两块地。
    tags: [量词]
    note: 塊(go3)用于片状物、土地、地方，也用于抽象地点如只块(zi2 go3)=这里、许块(he2 go3)=那里

  - char: 群
    mandarin: 群（人群/动物群的量词）
    pengim: kung5
    example: 一群侬在许块排队，一群羊在山顶食草。
    example_mandarin: 一群人在那里排队，一群羊在山上吃草。
    tags: [量词]
    note: 群(kung5)用于人群和动物群，如一群侬(zêg8 kung5 nang5)=一群人、一群羊(zêg8 kung5 iên5)=一群羊

  - char: 點
    mandarin: 点（液滴的量词）
    pengim: diam2
    example: 落几点雨，天时变凊了。
    example_mandarin: 下了几点雨，天气变凉了。
    tags: [量词]
    note: 點(diam2)用于滴状液体，如几点雨(guê3 diam2 hou6)=几滴雨、一点血(zêg8 diam2 huêh4)=一滴血

  - char: 包
    mandarin: 包（包装/束的量词）
    pengim: bao1
    example: 一包烟，两包糖，三包茶叶。
    example_mandarin: 一包烟，两包糖，三包茶叶。
    tags: [量词]
    note: 包(bao1)用于捆扎或包装好的一束、一捆、一包物品
